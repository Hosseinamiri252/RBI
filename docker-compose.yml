version: "3.9"
networks:
  iwap-network:
    driver: bridge
  browser-network:
    driver: bridge
    internal: false
volumes:
  postgres-data:
  minio-data:
  recordings:
  nginx-certs:
services:
  nginx:
    image: nginx:alpine
    container_name: iwap-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-certs:/etc/nginx/certs
    depends_on:
      - backend
      - frontend
    networks:
      - iwap-network
    restart: unless-stopped
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iwap-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/iwap
      SPRING_DATASOURCE_USERNAME: iwap
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: 3600000
      GUACD_HOST: guacd
      GUACD_PORT: 4822
      RECORDING_PATH: /recordings
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: recordings
      DOCKER_HOST: unix:///var/run/docker.sock
      BROWSER_IMAGE: kasmweb/chromium:1.14.0
      BROWSER_NETWORK: iwap_browser-network
      LDAP_ENABLED: ${LDAP_ENABLED:-false}
      LDAP_URL: ${LDAP_URL:-ldap://openldap:389}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-dc=company,dc=local}
      LDAP_USER_SEARCH_FILTER: ${LDAP_USER_SEARCH_FILTER:-(sAMAccountName={0})}
      LDAP_MANAGER_DN: ${LDAP_MANAGER_DN:-}
      LDAP_MANAGER_PASSWORD: ${LDAP_MANAGER_PASSWORD:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - recordings:/recordings
    depends_on:
      postgres:
        condition: service_healthy
      guacd:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - iwap-network
    restart: unless-stopped
  guacd:
    image: guacamole/guacd:1.5.4
    container_name: iwap-guacd
    volumes:
      - recordings:/recordings
    networks:
      - iwap-network
      - browser-network
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    container_name: iwap-postgres
    environment:
      POSTGRES_DB: iwap
      POSTGRES_USER: iwap
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - iwap-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iwap"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  minio:
    image: minio/minio:latest
    container_name: iwap-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    networks:
      - iwap-network
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iwap-frontend
    networks:
      - iwap-network
    restart: unless-stopped
  openldap:
    image: osixia/openldap:1.5.0
    container_name: iwap-openldap
    profiles: ["dev"]
    environment:
      LDAP_ORGANISATION: "Company"
      LDAP_DOMAIN: "company.local"
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD:-admin}
    networks:
      - iwap-network
    restart: unless-stopped
